version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: praxisforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: praxisforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: praxisforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxisforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: praxisforge-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: praxisforge-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - qdrant

  # ── Optional: MinIO for object storage ──────────────────
  minio:
    image: minio/minio:latest
    container_name: praxisforge-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    profiles:
      - full

  # ── Optional: Redis for caching ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: praxisforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    profiles:
      - full

volumes:
  pgdata:
  qdrantdata:
  miniodata:
  redisdata:
